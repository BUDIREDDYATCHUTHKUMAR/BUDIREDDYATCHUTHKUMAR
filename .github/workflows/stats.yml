# Save this file as: .github/workflows/stats.yml
# in your BUDIREDDYATCHUTHKUMAR profile repository

name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  workflow_dispatch:        # lets you run it manually from the Actions tab
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jstrieb/github-stats@master
        env:
          ACCESS_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move generated files
        run: |
          mkdir -p generated
          mv generated/overview.svg generated/overview.svg 2>/dev/null || true
          mv generated/languages.svg generated/languages.svg 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: stats-svgs
          path: generated/
